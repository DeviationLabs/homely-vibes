name: Fireworks PR Review (GLM 5.2)

on:
  pull_request:
    # `ready_for_review` lets us run when a draft PR is promoted; the
    # `if:` on the job then gates out actual drafts.
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

# Rapid pushes to a PR shouldn't fan out multiple reviewers — wastes
# Fireworks tokens and races comments.
concurrency:
  group: agent-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip drafts — reviewer noise while you're still iterating is just noise.
    if: github.event.pull_request.draft == false
    # Explicit cap so a hung Fireworks call never burns the 6h GHA default.
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate review with Fireworks (GLM 5.2)
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Defensive: BASE_SHA may not exist locally if base branch was force-pushed.
          # Fetch as unshallow so we don't graft a shallow root on top of the
          # fetch-depth: 0 checkout — a shallow BASE_SHA fetch breaks merge-base
          # resolution and made `git diff A...B` fatal with "no merge base".
          git fetch --no-tags origin "$BASE_SHA" 2>/dev/null || true

          # Streaming truncation: subshell disables pipefail so git diff's
          # SIGPIPE (when head closes after 400KB) doesn't fail the step.
          # Avoids the old `git diff | head -c N` exit-141 bug while also
          # capping disk use — important for PRs touching vendored dirs.
          # Use space-separated SHAs (tree-level diff) instead of three-dot
          # (symmetric diff, needs merge base) to survive shallow histories.
          ( set +o pipefail; git diff "$BASE_SHA" "$HEAD_SHA" | head -c 400000 > /tmp/diff.raw )

          # `head -c N` cuts on byte boundaries; mid-multibyte cuts produce
          # invalid UTF-8, which `jq --arg` rejects with a fatal error.
          # `iconv -c` drops invalid bytes; `tr -d '\000'` drops embedded NULs
          # (jq also chokes on those). Both are defensive against binary blobs
          # accidentally landing in a diff.
          tr -d '\000' < /tmp/diff.raw | iconv -f utf-8 -t utf-8 -c > /tmp/diff.txt

          SYSTEM_PROMPT='You are a senior code reviewer. Output ONLY a JSON object — no prose, no markdown, no reasoning text before or after. Begin your response with { and end with }.

          You only see the diff (lines starting with "+" are new), not the whole codebase. Do not flag things that may be defined elsewhere — imports, variables, helpers — or suggest code that duplicates existing functionality.

          What to flag:
          - Be thorough on clear bugs and security holes. Do not skip a genuine problem because the trigger scenario is narrow.
          - For lower-severity concerns, be certain before flagging: if you cannot give a concrete trigger scenario, do not flag it.
          - Each issue must be discrete and actionable, not a vague concern about the codebase.
          - Do not speculate that a change breaks other code unless you can point to the specific affected path from the diff.
          - Do not flag intentional design choices or style. Skip nits, naming, and formatting.
          - If confidence is low but impact is high (data loss, security), you may report it but state explicitly what remains uncertain. Otherwise, prefer silence over guessing.

          Output schema:
          - summary: at most one sentence (kept for the schema; not shown to humans).
          - issues: list per the rules above.
          - For each issue: path is the file path; line is the 1-indexed line in the NEW file version (a "+" line in the diff); severity is one of bug, security, design; body is one or two sentences — the problem, the realistic scenario that triggers it, and a fix suggestion. Do not overstate impact; if it only triggers under specific inputs, say so.
          - Tone: matter-of-fact, helpful. No praise, no filler, no accusations.
          - If no real issues, return an empty issues array.'

          SCHEMA='{
            "type": "object",
            "required": ["summary", "issues"],
            "additionalProperties": false,
            "properties": {
              "summary": {"type": "string", "maxLength": 240},
              "issues": {
                "type": "array",
                "items": {
                  "type": "object",
                  "required": ["path", "line", "severity", "body"],
                  "additionalProperties": false,
                  "properties": {
                    "path": {"type": "string"},
                    "line": {"type": "integer", "minimum": 1},
                    "severity": {"type": "string", "enum": ["bug", "security", "design"]},
                    "body": {"type": "string", "maxLength": 600}
                  }
                }
              }
            }
          }'

          # GLM 5.2 is a reasoning model (Z.ai, industry-leading on SWE-bench
          # Verified 77.8%): it emits chain-of-thought before the actual output.
          # The review prompt demands concrete trigger scenarios and confidence
          # calibration, so run reasoning_effort=medium for real judgment — and
          # raise max_tokens to 16384 so the longer CoT still leaves room for the
          # JSON tail, avoiding "unparseable JSON" skips. curl --max-time 300
          # matches the higher latency budget.
          PAYLOAD=$(jq -n \
            --rawfile diff /tmp/diff.txt \
            --arg sys "$SYSTEM_PROMPT" \
            --argjson schema "$SCHEMA" \
            '{
              model: "accounts/fireworks/models/glm-5p2",
              max_tokens: 16384,
              temperature: 0.1,
              reasoning_effort: "medium",
              response_format: {type: "json_object", schema: $schema},
              messages: [
                {role: "system", content: $sys},
                {role: "user", content: $diff}
              ]
            }')

          HTTP_RESPONSE=$(curl -sS --max-time 300 -w "\n%{http_code}" https://api.fireworks.ai/inference/v1/chat/completions \
            -H "Authorization: Bearer $FIREWORKS_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_STATUS=$(printf '%s' "$HTTP_RESPONSE" | tail -n1)
          BODY=$(printf '%s' "$HTTP_RESPONSE" | sed '$d')

          # All known-failure paths exit 0 with no /tmp/review.json — the post
          # step then posts a "review skipped" status comment so reviewers can
          # see the workflow ran. Unexpected failures still bubble up (red
          # check) so they're actually noticed.

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Fireworks API returned HTTP $HTTP_STATUS; skipping review." >&2
            printf '%s' "$BODY" | head -c 2000 >&2
            exit 0
          fi

          CONTENT=$(printf '%s' "$BODY" | jq -r '.choices[0].message.content // empty')
          if [ -z "$CONTENT" ]; then
            echo "::warning::Empty content from Fireworks; skipping review." >&2
            exit 0
          fi

          # Extract the JSON object from CONTENT. GLM 5.2 is a reasoning
          # model and sometimes emits chain-of-thought around the JSON.
          # A naive line-based sed extractor breaks on nested objects
          # (matches the first inner `}` as the end). Use Python's JSON
          # parser, which respects string boundaries and nesting.
          printf '%s' "$CONTENT" > /tmp/raw_content.txt
          if ! python3 - <<'PY' > /tmp/extracted.json 2>/tmp/extract_err.log
          import json, sys
          with open("/tmp/raw_content.txt") as f:
              s = f.read()
          start = s.find("{")
          if start < 0:
              sys.exit("no opening brace in model output")
          obj, _ = json.JSONDecoder().raw_decode(s[start:])
          json.dump(obj, sys.stdout)
          PY
          then
            echo "::warning::Model output was not parseable JSON; posting no PR comment. Raw preview (first 2KB) follows." >&2
            cat /tmp/extract_err.log >&2
            head -c 2000 /tmp/raw_content.txt >&2
            echo >&2
            exit 0
          fi

          jq '{summary: (.summary // ""), issues: (.issues // [])}' /tmp/extracted.json \
            > /tmp/review.json

          # Validate: filter out issues referencing files not in the diff.
          # Models sometimes hallucinate file paths (e.g. src/App.tsx in a
          # Python repo). Only keep issues for files actually changed.
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > /tmp/diff_files.txt
          python3 - <<'PY' > /tmp/review_validated.json 2>/tmp/validate_err.log || true
          import json
          with open("/tmp/review.json") as f:
              review = json.load(f)
          with open("/tmp/diff_files.txt") as f:
              diff_files = set(line.strip() for line in f if line.strip())
          review["issues"] = [i for i in review.get("issues", []) if i.get("path") in diff_files]
          json.dump(review, open("/tmp/review_validated.json", "w"))
          PY
          if [ -s /tmp/review_validated.json ]; then
            mv /tmp/review_validated.json /tmp/review.json
          fi

          echo "Parsed review:"
          cat /tmp/review.json

      - name: Post review (always a status comment; inline on real issues)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Always post *something* so the PR shows the reviewer's verdict for
          # this revision. If the generator step bailed (API down, unparseable
          # output), surface that instead of silent skip.
          if [ ! -s /tmp/review.json ]; then
            printf '**GLM 5.2:** review skipped — see workflow logs for details. (commit `%s`)\n' \
              "${HEAD_SHA:0:7}" \
              | gh pr comment "$PR_NUMBER" --body-file -
            exit 0
          fi

          ISSUE_COUNT=$(jq '.issues | length' /tmp/review.json)
          SHORT_SHA="${HEAD_SHA:0:7}"

          if [ "$ISSUE_COUNT" -eq 0 ]; then
            printf '**GLM 5.2:** no issues found in commit `%s`. ✅\n' "$SHORT_SHA" \
              | gh pr comment "$PR_NUMBER" --body-file -
            exit 0
          fi

          # Issues exist: post a single PR review with inline comments AND a
          # short top-level body summarizing the count for the Conversation tab.
          REVIEW_PAYLOAD=$(jq -n \
            --arg sha "$HEAD_SHA" \
            --arg short "$SHORT_SHA" \
            --arg count "$ISSUE_COUNT" \
            --slurpfile r /tmp/review.json \
            '{
              commit_id: $sha,
              event: "COMMENT",
              body: ("**GLM 5.2:** \($count) issue(s) flagged inline on commit `\($short)`."),
              comments: ($r[0].issues | map({
                path: .path,
                line: .line,
                side: "RIGHT",
                body: ("**[" + .severity + "]** " + .body)
              }))
            }')

          if ! echo "$REVIEW_PAYLOAD" | gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
              --method POST --input - 2>/tmp/review_err.log; then
            echo "::warning::Inline review POST failed (often line out of diff range). Falling back to a single comment with the issue list."
            cat /tmp/review_err.log
            {
              printf '**GLM 5.2:** %s issue(s) on commit `%s` — inline placement failed, listing here:\n\n' \
                "$ISSUE_COUNT" "$SHORT_SHA"
              jq -r '.issues[] | "- **[\(.severity)]** `\(.path):\(.line)` — \(.body)"' /tmp/review.json
            } | gh pr comment "$PR_NUMBER" --body-file -
          fi
