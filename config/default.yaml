# Default configuration for homely-vibes
# Safe defaults checked into git. Override with config/local.yaml (gitignored)

# === Paths and Directories ===
paths:
  home: ${oc.env:HOME}
  logging_dir: ${paths.home}/logs

# === Email Configuration ===
email:
  from_addr: user_from@gmail.com
  to_addr: user_to@gmail.com
  gmail_username: user_from
  gmail_password: ""  

# === Twilio SMS ===
twilio:
  sid: ""  
  auth_token: ""  
  sms_from: "+18001234567"

# === Pushover Notifications ===
pushover:
  user: ""  
  delivery_group: ""  
  default_token: ""  
  tokens:
    August: ""
    NetworkCheck: ""
    NodeCheck: ""
    Powerwall: ""
    RachioFlume: ""
    Ring Security: ""
    SamsungFrame: ""
    Rheem: ""
    WhatsAppSummary: ""

# === Node Monitoring ===
node_check:
  foscam:
    username: ""  
    password: ""  
    foscam_dir: /mnt/IPCam_Data
    purge_after_days: 90
  windows:
    username: ""  
    password: ""  
  # NODE_CONFIGS and NODES dicts - define in local.yaml
  node_configs: {}
  nodes: {}

# === Water Monitoring ===
water_monitor:
  # Processing settings
  max_zones: 16
  max_new_files: 2
  logrotate_per_day: 4
  days_lookback: 90
  start_from_epoch: 1539161991  # 2018-10-10-01-59-51

  # Alerting thresholds
  days_email_report: 14
  min_drip_zone_alert_time: 1800
  min_drip_plot_time: 189
  min_misc_zone_alert_time: 86400
  min_sprinkler_zone_alert_time: 600
  alert_thresh: 1.18  # 18% higher than average
  pump_alert: 22  # seconds
  pump_toggles_count: 25

# === Network Check ===
network_check:
  min_dl_bw: 150  # Mbps
  min_ul_bw: 4    # Mbps

# === Browser Alert ===
browser_alert:
  refresh_delay: 30  # seconds
  min_reporting_gap: 6  # hours
  hr_start_monitoring: 2
  hr_stop_monitoring: 23
  hr_email: 19
  blacklist:
    - pokemon
    - surviv
    - charmeleon
    - dutrigo
    - veekun
    - github
    - soraapp
    - emulator
    - gba
    - garfield
    - shellshock
    - youtube
    - scratch
    - clashman2.github.io
    - .io/
    - dragapult

# === Tesla Powerwall ===
tesla:
  powerwall_ip: "192.168.X.Y"
  powerwall_email: ""  
  powerwall_password: ""  
  powerwall_sms_rcpt: "+18001234567"
  powerwall_poll_time: 180

  tesla_email: ""
  tesla_password: ""
  tesla_token_file: config/tokens/tesla_tokens.json

  # Fleet API (Tesla developer-portal registered app). Set in local.yaml.
  fleet_client_id: ""
  fleet_client_secret: ""
  fleet_redirect_uri: "http://localhost:8585/callback"
  fleet_public_key_domain: "deviationlabs.com"
  fleet_region: "na"

  # Powerwall decision points
  decision_points:
    - time_start: 0
      time_end: 100
      pct_gradient_per_hr: 0
      pct_thresh: 28
      iff_higher: false
      pct_min: 30
      pct_min_trail_stop: 0
      op_mode: autonomous
      reason: "Prep for midnight recharge.."
      always_notify: true

    - time_start: 1300
      time_end: 1455
      pct_gradient_per_hr: 35
      pct_thresh: 99
      iff_higher: false
      pct_min: 20
      pct_min_trail_stop: 0
      op_mode: autonomous
      reason: "Solar recharge insufficient. Drawdown before shoulder.."
      always_notify: true

    - time_start: 1455
      time_end: 1900
      pct_gradient_per_hr: 0
      pct_thresh: 0
      iff_higher: true
      pct_min: 20
      pct_min_trail_stop: 0
      op_mode: self_consumption
      reason: "In Peak. Discharge.."
      always_notify: false

    - time_start: 0
      time_end: 1500
      pct_gradient_per_hr: 0
      pct_thresh: 0
      iff_higher: true
      pct_min: 30
      pct_min_trail_stop: 10
      op_mode: self_consumption
      reason: "Nightly reserves rebuilt. Solar charge only.."
      always_notify: false

    - time_start: 1900
      time_end: 2359
      pct_gradient_per_hr: -8
      pct_thresh: 20
      iff_higher: false
      pct_min: 20
      pct_min_trail_stop: 0
      op_mode: self_consumption
      reason: "Reserve for rest of shoulder.."
      always_notify: false

    - time_start: 1900
      time_end: 2100
      pct_gradient_per_hr: -35
      pct_thresh: 40
      iff_higher: true
      pct_min: 20
      pct_min_trail_stop: 0
      op_mode: autonomous
      reason: "Dump surplus before end of peak.."
      always_notify: false

# === August Smart Locks ===
august:
  email: ""  
  password: ""  
  phone: "+1234567890"
  token_file: config/tokens/august_auth_token.json

# === Rheem EcoNet Water Heater ===
rheem:
  email: ""
  password: ""
  poll_seconds: 300
  # Discrete tank levels reported by EcoNet: 0/33/66/100.
  empty_threshold: 0    # empty -> P2 emergency (retries until acked)
  low_threshold: 33     # 1/3rd full -> P1 high (bypasses quiet hours)
  mid_threshold: 66     # 2/3rd full -> P-1 clear, reset alert state

# === Ring Devices ===
ring:
  username: ""
  password: ""
  token_file: config/tokens/ring_auth_token.json
  battery_threshold_pct: 25

# === Ring Beams / Alarm sensors (via Node sidecar) ===
# Reuses the RingSecurity OAuth token. Same Pushover token as RingSecurity
# ("Ring Security"). Sidecar timeout covers Node startup + socket.io handshake
# + initial device-state burst.
ring_beams:
  token_file: config/tokens/ring_auth_token.json
  battery_threshold_pct: 25
  sidecar_timeout_seconds: 45

# === Samsung Frame TV ===
samsung_frame:
  ip: "192.168.X.Y"
  mac: ""  # MAC address for Wake-on-LAN (e.g. "AA:BB:CC:DD:EE:FF")
  wol_password: ""  # SecureON password (hex, e.g. "AA:BB:CC:DD:EE:FF"), empty = disabled
  smartthings_token: ""  # SmartThings PAT for cloud power-on fallback, empty = skip
  smartthings_device_id: ""  # SmartThings device ID for the TV
  port: 8002
  token_file: config/tokens/samsung_frame_token.txt
  default_matte: shadowbox_black
  supported_formats:
    - jpg
    - jpeg
    - png
  max_image_size_mb: 10
  min_size_mb: 0.75  # minimum file size to upload (750KB)
  min_images: 100  # minimum user images to maintain on TV during purge
  slideshow_delay_seconds: 3  # delay before starting slideshow after upload

# === Rachio Irrigation ===
# `type`: "controller"  -> api.rach.io/1/public/device/*  (Smart Sprinkler Controller)
#         "hose_timer"  -> cloud-rest.rach.io/valve/*     (Smart Hose Timer base station)
# Override `devices` in local.yaml with real ids/labels.
rachio:
  api_key: ""
  devices: []

# === Flume Water Monitoring ===
flume:
  client_id: ""
  client_secret: ""
  user_email: ""
  password: ""

# === RachioFlume Usage Alerts ===
# All alerts fire at Pushover priority 2 (emergency, retries until acked).
# Re-trigger every default_retrigger_minutes while condition holds, unless muted.
# A priority 0 "all clear" fires on transition active -> clear.
# Alerts are suppressed entirely while a Rachio zone is irrigating.
rachio_flume:
  alerts:
    enabled: true
    default_retrigger_minutes: 30   # cadence for re-firing default_flow_rules

    # === Per-zone anomaly check (Rachio-sourced; fires at run end) ===
    # threshold = avg_gpm + max(absolute_gpm, percent_above/100 * avg_gpm)
    zone_anomaly:
      threshold_mode: adaptive       # informational; computation is "adaptive"
      absolute_gpm: 0.5              # min deviation above average (GPM)
      percent_above: 10              # min deviation above average (%)
      min_runtime_minutes: 5         # zone must run this long before anomaly fires
      # Per-zone baseline flow rates (GPM) from historical data.
      # Outer key = device label (matches rachio.devices[].label).
      # Inner key = zone identifier:
      #   - Controllers: stringified zone_number (e.g. "1")
      #   - Hose timers: raw valve name (e.g. "Z13 FS - Upper Deck Planters")
      # Value: {avg_gpm: <float>}. Display labels derive from the raw key via
      # compact_zone_label(); no display `name:` field needed.
      zone_thresholds: {}

    # === Whole-house sustained-flow rules (Flume only; no Rachio context) ===
    # Suppressed while any Rachio activity (controller OR hose-timer) is recent.
    default_flow_rules:
      - {name: "Pipe Break", min_gpm: 8.0, duration_minutes: 10}
      - {name: "High Flow",  min_gpm: 5.4, duration_minutes: 4}
      - {name: "Mid Flow",   min_gpm: 2.0, duration_minutes: 14}
      - {name: "Leak",       min_gpm: 0.1, duration_minutes: 120}

    # === Stale-zone monitoring ===
    # Fire a P-1 heads-up if any enabled controller zone or connected
    # hose-timer valve hasn't run within this many days.
    stale_zone_days: 15

# === PersonalCalSync (Google Apps Script) ===
personal_cal_sync:
  script_id: ""   # Apps Script project ID — override in config/local.yaml

# === VoiceNotes — local push-to-talk STT via whisper.cpp ===
voice_notes:
  model_id: "large-v3-turbo"              # whisper.cpp model name; auto-downloads to ~/.cache/pywhispercpp/
  hotkey: "right_option"                  # pynput Key name (right_option = ⌥ right)
  notes_dir: "~/bin/knowledge/notes"      # output directory; created on first run
  sample_rate: 16000                      # Hz — required by whisper.cpp
  channels: 1                             # mono
  vad_aggressiveness: 2                   # webrtcvad 0 (least) – 3 (most aggressive silence detection)
  n_threads: 4                            # CPU threads for whisper.cpp (Metal GPU used automatically)

# === Prod Controller (remote DB host for integration tests) ===
prod_controller:
  ssh_host: ""          # e.g. "user@host"
  db_path: ""           # e.g. "~/logs/water_tracking.db"

# === Constants ===
my_external_ip: "hoiboi.tplinkdns.com"
seconds_in_day: 86400
