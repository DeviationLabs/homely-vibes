title: "Homely Vibes"
description: "🏠 Smart IoT Home Automation & Monitoring System with ML-powered Analytics"
url: "https://homely-vibes.deviationlabs.com"
baseurl: ""

# GitHub integration - ensure assets load from GitHub Pages
github:
  repository_url: "https://github.com/abutala/homely-vibes"
  repository_name: "homely-vibes"
  owner_name: "abutala"
  owner_url: "https://github.com/abutala"
  is_project_page: true

# SEO and social
author: "Amit Butala"
twitter:
  username: abutala
social:
  name: "Amit Butala"
  links:
    - "https://github.com/abutala"

# Page metadata
lang: en
timezone: America/Los_Angeles

remote_theme: pages-themes/cayman@v0.2.0
plugins:
- jekyll-remote-theme
- jekyll-seo-tag
- jekyll-readme-index

# Enable HTML in markdown for better styling
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Exclude directories that contain application code, not website content.
# Kept in sync with tracked top-level module dirs — every code dir belongs here.
exclude:
- August/
- BimpopAI/
- BrowserAlert/
- config/
- GarageCheck/
- GPXParser/
- LambdaEmailFwder/
- LaunchJobs/
- lib/
- NetworkCheck/
- NodeCheck/
- NoShorts/
- OpenAIAdmin/
- PersonalCalSync/
- RachioFlume/
- RingBeams/
- RingSecurity/
- SamsungFrame/
- Tesla/
- VoiceNotes/
- VSCodeSidebarNotes/
- backups/  # gitignored on disk; keep here as belt-and-suspenders vs. any accidental commit
- Makefile
- pyproject.toml
- uv.lock
- .python-version
